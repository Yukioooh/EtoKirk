name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/twitch-analyzer

            # Sauvegarder le fichier .env et la base de donnees
            cp .env .env.backup 2>/dev/null || true
            mkdir -p data/backup
            cp data/*.db data/backup/ 2>/dev/null || true

            # Recuperer les derniers changements
            git pull origin main

            # Restaurer le fichier .env
            cp .env.backup .env 2>/dev/null || true

            # Installer les dependances backend
            npm install

            # Installer et build le frontend
            cd frontend
            npm install
            npm run build
            cd ..

            # Fixer les permissions
            chmod -R 755 frontend/build/

            # Redemarrer avec PM2
            pm2 restart twitch-analyzer || pm2 start src/index.js --name twitch-analyzer
            pm2 save

            # Verifier que l'app repond
            sleep 3
            if curl -s http://localhost:3001/api/health | grep -q "ok"; then
              echo "Deploiement reussi!"
            else
              echo "Erreur: l'application ne repond pas"
              pm2 logs twitch-analyzer --lines 20
              exit 1
            fi
